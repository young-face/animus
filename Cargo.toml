http = "1.4.2"
httpmock = "0.8.3"
reqwest = "0.13.4"
serde = "1.0.228"
thiserror = "2.0.18"
tokio = "1.52.3"
tokio-util = "0.7.18"
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
