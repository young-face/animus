[workspace]
resolver = "3"
members = ["api", "rest/client", "tck"]

[workspace.dependencies]
# Internal
api = { package = "animus-api", path = "api" }
tck = { package = "animus-tck", path = "tck" }

# External

bytes = "1.12.1"
console-subscriber = "0.5.0"
